server:
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    threads:
      max: 400
spring:
  datasource:
    hikari:
      maximum-pool-size: 50
  data:
    redis:
      lettuce:
        pool:
          enabled: true
          max-active: 50
          max-idle: 20
          min-idle: 5
  jpa:
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://mock-jwks.fallboot.local:9999
          jwk-set-uri: http://mock-jwks.fallboot.local:9999/.well-known/jwks.json
  kafka:
    topic:
      name: pixel-updates
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        linger.ms: 50
        batch.size: 65536
        security.protocol: SSL
  rabbitmq:
    ssl: false
