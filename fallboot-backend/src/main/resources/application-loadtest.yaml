server:
  compression:
    enabled: true
    min-response-size: 1024
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fallboot
    username: myUser
    password: password1234
    hikari:
      maximum-pool-size: 50
  data:
    redis:
      port: 6379
      lettuce:
        pool:
          enabled: true
          max-active: 50
          max-idle: 20
          min-idle: 5
  jpa:
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999
          jwk-set-uri: http://localhost:9999/.well-known/jwks.json
  kafka:
    topic:
      name: pixel-updates
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        linger.ms: 50
        batch.size: 65536
  rabbitmq:
    host: localhost
    port: 61613
    username: guest
    password: guest