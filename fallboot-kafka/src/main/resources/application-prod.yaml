spring:
  datasource:
    hikari:
      maximum-pool-size: 5
  data:
    redis:
      port: 6379
  jpa:
    show-sql: false
  kafka:
    topic:
      name: pixel-updates
    consumer:
      group-id: fallboot-kafka-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.andy.fallboot.shared.*
        security.protocol: SSL
