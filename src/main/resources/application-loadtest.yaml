spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fallboot
    username: myUser
    password: password1234
  data:
    redis:
      port: 6379
      lettuce:
        pool:
          enabled: true
          max-active: 50
          max-idle: 20
          min-idle: 5
  jpa:
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999
          jwk-set-uri: http://localhost:9999/.well-known/jwks.json
